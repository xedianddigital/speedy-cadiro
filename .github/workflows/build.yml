name: Build installers

on:
  # Every push to master produces downloadable artifacts for fast iteration.
  # Pushing a tag (v0.2.0) additionally publishes a permanent GitHub Release.
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: --win
            artifact: windows-installer
            path: dist/*.exe
          - os: ubuntu-latest
            platform: --linux
            artifact: linux-appimage
            path: dist/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next standalone bundle
        run: pnpm prepack:standalone

      # electron-builder rebuilds better-sqlite3 against Electron's ABI, which
      # needs a working native toolchain. The runners ship one already.
      #
      # --publish never: electron-builder otherwise tries to publish a release
      # itself when it detects CI, which needs a token. Releases are attached by
      # the step below instead.
      - name: Build installer
        run: pnpm exec electron-builder ${{ matrix.platform }} --publish never
        env:
          # Skip code signing: unsigned builds still install, they just show a
          # SmartScreen warning the user has to click through.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # Version and commit in the name so a downloaded build is traceable to
          # the code that produced it.
          name: ${{ matrix.artifact }}-${{ github.sha }}
          path: ${{ matrix.path }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.path }}
          fail_on_unmatched_files: true
